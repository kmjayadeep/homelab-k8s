apiVersion: v1
kind: Namespace
metadata:
  name: ai-sre-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: k8s-ai-sre
  namespace: ai-sre-system
spec:
  path: clusters/titania/apps/k8s-ai-sre
  dependsOn:
    - name: sealed-secrets
      namespace: flux-system
    - name: monitoring
      namespace: monitoring
    - name: ingress-nginx
      namespace: ingress-nginx
  interval: 15m
  prune: true
  wait: true
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: k8s-ai-sre
      namespace: ai-sre-system
