apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: seerr
spec:
  image: ghcr.io/seerr-team/seerr
  interval: 5m
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: seerr
spec:
  imageRepositoryRef:
    name: seerr
  filterTags:
    pattern: '^v(?P<semver>[0-9]*\.[0-9]*\.[0-9]*)'
    extract: '$semver'
  policy:
    semver:
      range: '>3.0.0'
