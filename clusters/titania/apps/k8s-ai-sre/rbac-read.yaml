apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-ai-sre
  namespace: ai-sre-system
  labels:
    app.kubernetes.io/name: k8s-ai-sre
    app.kubernetes.io/instance: k8s-ai-sre
    app.kubernetes.io/component: serviceaccount
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-ai-sre-read
  labels:
    app.kubernetes.io/name: k8s-ai-sre
    app.kubernetes.io/instance: k8s-ai-sre
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-ai-sre-read
  labels:
    app.kubernetes.io/name: k8s-ai-sre
    app.kubernetes.io/instance: k8s-ai-sre
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-ai-sre-read
subjects:
  - kind: ServiceAccount
    name: k8s-ai-sre
    namespace: ai-sre-system
