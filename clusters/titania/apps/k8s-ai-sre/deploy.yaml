apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ai-sre
  namespace: ai-sre-system
  labels:
    app.kubernetes.io/name: k8s-ai-sre
    app.kubernetes.io/instance: k8s-ai-sre
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-ai-sre
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-ai-sre
        app.kubernetes.io/instance: k8s-ai-sre
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: k8s-ai-sre
      containers:
        - name: app
          image: ghcr.io/kmjayadeep/k8s-ai-sre:main
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: k8s-ai-sre-env
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
